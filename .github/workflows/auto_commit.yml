name: 🟢 Auto Commit Profile

on:
  schedule:
    - cron: "0 8  * * *"   # 1er commit — 8h UTC  (9h Maroc)
    - cron: "0 10 * * *"   # 2ème commit — 10h UTC (11h Maroc)
    - cron: "0 12 * * *"   # 3ème commit — 12h UTC (13h Maroc)
    - cron: "0 15 * * *"   # 4ème commit — 15h UTC (16h Maroc)
    - cron: "0 18 * * *"   # 5ème commit — 18h UTC (19h Maroc)
  workflow_dispatch:         # lancement manuel possible

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update activity file
        run: |
          mkdir -p .github
          echo "Last auto-commit: $(date '+%Y-%m-%d %H:%M:%S UTC')" > .github/activity.log

      - name: Commit & Push
        run: |
          git config user.name  "idabella"
          git config user.email "idabella@users.noreply.github.com"
          git add .github/activity.log
          git diff --cached --quiet || git commit -m "chore: daily activity $(date '+%Y-%m-%d')"
          git push
